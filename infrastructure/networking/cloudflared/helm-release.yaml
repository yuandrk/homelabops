apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudflared
  namespace: networking
spec:
  interval: 30m
  chart:
    spec:
      chart: cloudflare-tunnel-remote
      version: ">=0.1.2"
      sourceRef:
        kind: HelmRepository
        name: cloudflare
        namespace: networking
  values:
    replicaCount: 2
  valuesFrom:
    - kind: Secret
      name: cloudflared-token
      valuesKey: tunnelToken
      targetPath: cloudflare.tunnel_token
