apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: 1password-operator
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: connect
      version: ">=1.15.0"
      sourceRef:
        kind: HelmRepository
        name: 1password
        namespace: flux-system
  targetNamespace: onepassword
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    connect:
      create: false
    operator:
      create: true
      autoRestart: true
      authMethod: service-account
      serviceAccountToken:
        name: onepassword-token
        key: token
