---
# ScrapeConfig for Traefik ingress controller
# Uses Kubernetes pod discovery to find Traefik pods in kube-system directly,
# avoiding cross-namespace Service selector issues from the monitoring namespace override.
# Traefik already exposes metrics on port 9100 (entrypoint: metrics) by default in K3s.
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: traefik
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  kubernetesSDConfigs:
    - role: Pod
      namespaces:
        names:
          - kube-system
  relabelings:
    - sourceLabels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
      regex: traefik
      action: keep
    - sourceLabels: [__meta_kubernetes_pod_container_port_name]
      regex: metrics
      action: keep
    - sourceLabels: [__meta_kubernetes_pod_name]
      targetLabel: pod
    - sourceLabels: [__meta_kubernetes_namespace]
      targetLabel: namespace
    - targetLabel: job
      replacement: traefik
