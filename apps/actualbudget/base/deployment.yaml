apiVersion: apps/v1
kind: Deployment
metadata:
  name: actualbudget
  namespace: apps
  labels:
    app: actualbudget
spec:
  replicas: 1
  selector:
    matchLabels:
      app: actualbudget
  template:
    metadata:
      labels:
        app: actualbudget
    spec:
      containers:
      - name: actualbudget
        image: actualbudget/actual-server:26.4.0
        ports:
        - containerPort: 5006
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: NODE_OPTIONS
          value: "--max-old-space-size=768"
        - name: ACTUAL_UPLOAD_FILE_SYNC_SIZE_LIMIT_MB
          value: "100"
        volumeMounts:
        - name: actual-data
          mountPath: /data
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 1Gi
      volumes:
      - name: actual-data
        persistentVolumeClaim:
          claimName: actualbudget-data